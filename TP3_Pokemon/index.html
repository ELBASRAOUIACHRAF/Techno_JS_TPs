<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Mini-Battle</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        .arena { display: flex; justify-content: space-around; margin-top: 20px; }
        .pokemon-card { border: 2px solid #ddd; padding: 15px; border-radius: 10px; width: 40%; background: #fafafa; }
        .hp-bar-container { width: 100%; background: #ccc; border-radius: 5px; margin-top: 10px; }
        .hp-bar { height: 20px; background: #4caf50; border-radius: 5px; width: 100%; transition: width 0.3s ease; }
        .moves-container { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 10px 15px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        #log { margin-top: 20px; padding: 10px; height: 100px; overflow-y: auto; background: #222; color: #fff; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mini-Jeu Pokémon</h1>
    
    <div id="setup">
        <p>Choisis ton Pokémon pour combattre !</p>
        <input type="text" id="pokemonName" placeholder="Ex: pikachu, charizard..." style="padding:10px;">
        <button onclick="startGame()">Commencer le combat</button>
    </div>

    <div id="loading" style="display:none;">
        <p>Chargement des Pokémon et des attaques (cela peut prendre quelques secondes)...</p>
    </div>

    <div id="battle" style="display:none;">
        <div class="arena">
            <div class="pokemon-card">
                <h2 id="playerName">Joueur</h2>
                <img id="playerSprite" src="" alt="Player" width="120">
                <p>HP: <span id="playerHpText">300</span> / 300</p>
                <div class="hp-bar-container">
                    <div id="playerHpBar" class="hp-bar"></div>
                </div>
            </div>

            <div class="pokemon-card">
                <h2 id="enemyName">Ennemi</h2>
                <img id="enemySprite" src="" alt="Enemy" width="120">
                <p>HP: <span id="enemyHpText">300</span> / 300</p>
                <div class="hp-bar-container">
                    <div id="enemyHpBar" class="hp-bar"></div>
                </div>
            </div>
        </div>

        <h3>Choisis ton attaque :</h3>
        <div id="moves" class="moves-container"></div>

        <div id="log"></div>
    </div>
</div>

<script>
    const API_URL = "https://pokeapi.co/api/v2/pokemon/";

    // Variables d'état du jeu
    let player = { hp: 300, maxHp: 300, name: "", sprite: "", moves: [] };
    let enemy = { hp: 300, maxHp: 300, name: "", sprite: "", moves: [] };
    let gameOver = false;

    // Fonction pour écrire dans le journal de combat
    function writeLog(message) {
        const logDiv = document.getElementById("log");
        logDiv.innerHTML += `<p>> ${message}</p>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Lancement du jeu
    async function startGame() {
        const pNameInput = document.getElementById("pokemonName").value.toLowerCase().trim();
        if (!pNameInput) return alert("Veuillez entrer un nom de Pokémon !");

        document.getElementById("setup").style.display = "none";
        document.getElementById("loading").style.display = "block";

        try {
            // 1. Récupérer le Pokémon du joueur
            const pRes = await fetch(API_URL + pNameInput);
            if (!pRes.ok) throw new Error("Pokémon introuvable");
            const pData = await pRes.json();

            // 2. Récupérer un Pokémon ennemi aléatoire (entre 1 et 151)
            const randomId = Math.floor(Math.random() * 151) + 1;
            const eRes = await fetch(API_URL + randomId);
            const eData = await eRes.json();

            // 3. Remplir les données
            player.name = pData.name.toUpperCase();
            player.sprite = pData.sprites.front_default || pData.sprites.other["official-artwork"].front_default;
            player.moves = await fetchMoves(pData.moves);

            enemy.name = eData.name.toUpperCase();
            enemy.sprite = eData.sprites.front_default || eData.sprites.other["official-artwork"].front_default;
            enemy.moves = await fetchMoves(eData.moves);

            // 4. Mettre à jour l'interface HTML
            document.getElementById("playerName").innerText = player.name;
            document.getElementById("playerSprite").src = player.sprite;
            document.getElementById("enemyName").innerText = enemy.name;
            document.getElementById("enemySprite").src = enemy.sprite;

            createMoveButtons();
            
            document.getElementById("loading").style.display = "none";
            document.getElementById("battle").style.display = "block";
            writeLog(`Un ${enemy.name} sauvage apparaît !`);

        } catch (error) {
            alert("Erreur: Le Pokémon n'existe pas ou l'API est indisponible.");
            location.reload();
        }
    }

    // Récupérer 5 attaques valides (qui font des dégâts)
    async function fetchMoves(allMovesList) {
        let validMoves = [];
        // Mélanger les attaques disponibles
        let shuffled = allMovesList.sort(() => 0.5 - Math.random());

        for (let item of shuffled) {
            if (validMoves.length === 5) break; // On s'arrête à 5
            
            let res = await fetch(item.move.url);
            let moveData = await res.json();

            // On ne garde que les attaques avec une puissance (dégâts > 0)
            if (moveData.power !== null && moveData.power > 0) {
                validMoves.push({
                    name: moveData.name.toUpperCase(),
                    power: moveData.power,
                    accuracy: moveData.accuracy !== null ? moveData.accuracy : 100,
                    pp: moveData.pp
                });
            }
        }
        return validMoves;
    }

    // Créer les boutons d'attaques pour le joueur
    function createMoveButtons() {
        const movesDiv = document.getElementById("moves");
        movesDiv.innerHTML = "";
        
        player.moves.forEach((move, index) => {
            const btn = document.createElement("button");
            btn.innerHTML = `<strong>${move.name}</strong><br>Pwr: ${move.power} | Acc: ${move.accuracy}% | PP: ${move.pp}`;
            btn.onclick = () => playTurn(index);
            movesDiv.appendChild(btn);
        });
    }

    // Exécuter un tour de combat
    function playTurn(playerMoveIndex) {
        if (gameOver) return;

        const pMove = player.moves[playerMoveIndex];
        // L'ennemi choisit une attaque aléatoire
        const eMove = enemy.moves[Math.floor(Math.random() * enemy.moves.length)];

        writeLog(`--- NOUVEAU TOUR ---`);

        // TOUR DU JOUEUR
        // Règle spécifique : si le PP est inférieur à celui de l'ennemi, l'attaque échoue
        if (pMove.pp < eMove.pp) {
            writeLog(`${player.name} tente d'utiliser ${pMove.name}... Mais échoue ! (PP inférieurs à l'ennemi : ${pMove.pp} vs ${eMove.pp})`);
        } else {
            // Prise en compte de la précision
            if (Math.random() * 100 <= pMove.accuracy) {
                enemy.hp -= pMove.power;
                writeLog(`${player.name} utilise ${pMove.name} et inflige ${pMove.power} dégâts !`);
            } else {
                writeLog(`${player.name} utilise ${pMove.name}... Mais l'attaque rate !`);
            }
        }

        updateUI();
        if (checkWin()) return;

        // TOUR DE L'ENNEMI
        setTimeout(() => {
            if (eMove.pp < pMove.pp) {
                writeLog(`${enemy.name} tente d'utiliser ${eMove.name}... Mais échoue ! (PP inférieurs à vous)`);
            } else {
                if (Math.random() * 100 <= eMove.accuracy) {
                    player.hp -= eMove.power;
                    writeLog(`${enemy.name} utilise ${eMove.name} et vous inflige ${eMove.power} dégâts !`);
                } else {
                    writeLog(`${enemy.name} utilise ${eMove.name}... Mais l'attaque rate !`);
                }
            }
            updateUI();
            checkWin();
        }, 1000); // Petit délai pour lire le journal
    }

    // Mettre à jour les barres de vie
    function updateUI() {
        if (player.hp < 0) player.hp = 0;
        if (enemy.hp < 0) enemy.hp = 0;

        document.getElementById("playerHpText").innerText = player.hp;
        document.getElementById("enemyHpText").innerText = enemy.hp;

        document.getElementById("playerHpBar").style.width = (player.hp / player.maxHp) * 100 + "%";
        document.getElementById("enemyHpBar").style.width = (enemy.hp / enemy.maxHp) * 100 + "%";
        
        // Changer la couleur de la barre de vie si basse
        if (player.hp <= 60) document.getElementById("playerHpBar").style.background = "red";
        if (enemy.hp <= 60) document.getElementById("enemyHpBar").style.background = "red";
    }

    // Vérifier si quelqu'un a perdu
    function checkWin() {
        if (enemy.hp === 0) {
            writeLog(`<b>VICTOIRE ! ${enemy.name} est KO.</b>`);
            endGame();
            return true;
        }
        if (player.hp === 0) {
            writeLog(`<b>DÉFAITE... ${player.name} est KO.</b>`);
            endGame();
            return true;
        }
        return false;
    }

    // Fin du jeu
    function endGame() {
        gameOver = true;
        const buttons = document.querySelectorAll("#moves button");
        buttons.forEach(btn => btn.disabled = true);
    }
</script>

</body>
</html>
